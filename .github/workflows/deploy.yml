name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore
        run: dotnet restore

      - name: Build WASM demo
        run: dotnet publish FloatPanel.Browser/FloatPanel.Browser.csproj -c Release --nologo -v q

      - name: Install docfx
        run: dotnet tool update -g docfx

      - name: Build documentation
        run: docfx docfx.json

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p dist
          cp -r _site/* dist/
          mkdir -p dist/demo
          cp -r FloatPanel.Browser/bin/Release/net10.0-browser/publish/wwwroot/* dist/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
